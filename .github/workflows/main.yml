name: Upload to YouTube
on:
  schedule:
    - cron: '0 10 * * *' # هاد الكود كيخدم كل نهار مع 10 د الصباح أوتوماتيك
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Upload to YouTube
        run: |
          # هنا كيكون سكربت كيتواصل مع API ديال يوتوب
          python upload_script.py --file "video.mp4" --title "Speed Funny Moment"
